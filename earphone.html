<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "PML", 'PMingLiU', '新細明體', serif;
            background-image: url('r.jpg'); /* 沿用好看的背景圖 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            -webkit-backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        .counter-box {
            position: relative;
            z-index: 2;
            background-color: #99ffcc; /* 薄荷綠 */
            border: 1px solid #55cc99;
            border-radius: 4px; /* 無名小站方塊感 */
            padding: 40px 30px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 80%;
        }
        h2 {
            font-size: 1.3rem;
            color: #000000;
            /* 🌟 直接歸零！不留任何底部空間 */
            margin-bottom: 0px; 
            margin-top: 0; 
        }
        .number-area {
            display: inline-block;
            background: #000000; /* 經典黑底框 */
            border: 1px dashed #ffffff;
            padding: 12px 24px;
            margin: 10px 0;
            box-shadow: inset 0 0 10px rgba(204, 102, 255, 0.5);
        }
        .custom-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ffcc; /* 薄荷綠電子字 */
            letter-spacing: 4px;
            font-family: monospace, serif;
            text-shadow: 0px 0px 8px #00ffcc, 0px 0px 3px #ffffff;
        }

        /* 🌟 1. 規則小文字連結樣式 */
        .rules-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #cc66ff;
            text-decoration: none;
            border-bottom: 1px dashed #cc66ff; /* 復古虛線底線 */
            transition: all 0.2s ease;
        }
        .rules-link:hover {
            color: #cc66ff; /* 滑鼠移過去變紫色 */
            border-bottom: 1px dashed #cc66ff;
            text-shadow: 0px 0px 5px rgba(204, 102, 255, 0.5);
        }

        /* 🌟 2. 彈出視窗的全畫面半透明黑底遮罩 */
        .modal-overlay {
            display: none; /* 預設隱藏 */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 100; /* 確保浮在最上層 */
            justify-content: center;
            align-items: center;
        }

        /* 🌟 3. 彈出視窗的白色復古框框本體 */
        .modal-content {
            background-color: #ADFEDC; 
            border: 2px solid #000000; /* 經典黑粗框 */
            box-shadow: 4px 4px 0px rgb(0, 204, 255); /* 紫色錯位陰影 */
            width: 85%;
            max-width: 350px;
            padding: 25px 20px;
            position: relative;
            text-align: left;
        }

        /* 🌟 4. 視窗右上角的復古 X 關閉按鈕 */
        .close-btn {
            position: absolute;
            top: 6px; right: 6px;
            background: #ffcccc; /* 偷用你賣貨便的粉紅色 */
            border: 1px solid #000000;
            font-family: monospace, serif;
            font-size: 0.9rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            padding: 2px 6px;
        }
        .close-btn:hover {
            background: #ff9999;
        }

        /* 視窗內部的文字排版 */
        .rules-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #00BB00;
            margin-bottom: 15px;
            text-align: center;
            text-decoration: underline;
        }
        .rules-list {
            margin: 0;
            padding-left: 20px;
            color: #00BB00;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .rules-list li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="counter-box">
        <h2>✮ 有線耳機復活計畫 ♫</h2>
        <p style="color: #339966; margin-bottom: 0px;">恭喜你成為有線耳機復活計畫的一員！</p>
        <p style="color: #339966; margin-bottom: 0px;">♪ 好時光都該被寶貝因為有線~ ♪</p>
        <p style="color: #1e293b; margin-bottom: 20px; font-size: 1.1rem;">您是第</p>
        
        <div class="number-area">
            <span id="member-id" class="custom-number">000000</span>
        </div>
        
        <p style="color: #1e293b; margin-top: 20px; font-size: 1.1rem;">位加入的會員</p>
        
        <a href="#" id="open-rules-btn" class="rules-link">✞ 點我查看會員規則 ✞</a>
    </div>

    <div id="rules-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-rules-btn" class="close-btn">X</button>
            <div class="rules-title">★ 秘密會員規則 ★</div>
            <ul class="rules-list">
                <li>1.需每天帶有線耳機出門。</li>
                <li>2.擁有【有線耳機復活計畫】小卡。</li>
                <li>3.尊重所有類型的音樂，並遵守「不批判、不比較、不評論」的原則。</li>
                <li>4.音樂沒有優劣之分，所有人都能擁有自己的信仰。</li>
            </ul>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-name-btn" class="close-btn">X</button>
            <div class="input-title">★ 建立專屬會員卡 ★</div>
            <p style="color: #00BB00; font-size: 0.85rem; margin-bottom: 15px; text-align: center; font-weight: bold;">請輸入您的暱稱</p>
            <input type="text" id="user-name-input" class="name-input" placeholder="Name" maxlength="10">
            <button id="confirm-download-btn" class="submit-btn">確定下載</button>
        </div>
    </div>

    <canvas id="download-canvas" width="600" height="400" style="display: none;"></canvas>

    <script>
        // ======= 彈出視窗控制 =======
        const rulesModal = document.getElementById('rules-modal');
        const nameModal = document.getElementById('name-modal');
        
        document.getElementById('open-rules-btn').onclick = (e) => { e.preventDefault(); rulesModal.style.display = 'flex'; };
        document.getElementById('close-rules-btn').onclick = () => rulesModal.style.display = 'none';
        document.getElementById('close-name-btn').onclick = () => nameModal.style.display = 'none';
        document.getElementById('download-trigger-btn').onclick = () => nameModal.style.display = 'flex';

        window.onclick = (e) => {
            if (e.target === rulesModal) rulesModal.style.display = 'none';
            if (e.target === nameModal) nameModal.style.display = 'none';
        };

        // ======= 絕對會動的計數器 =======
        const numberElement = document.getElementById('member-id');
        let finalNumber = 0; 
        
        // 使用你最新的 GAS 網址
        const gasUrl = 'https://script.google.com/macros/s/AKfycbytIyUt9P-5lejKe6KfYZxd2VezUG-Hy15wXGmooAQk78Rxw3erRx3HJu07LhawKektfA/exec';

        // 先讓數字瘋狂跳動
        let isFetched = false;
        const interval = setInterval(() => {
            if(!isFetched) numberElement.innerText = Math.floor(Math.random() * 900000 + 100000);
        }, 80);

        // 抓取真實數字
        fetch(gasUrl)
            .then(res => res.json())
            .then(data => {
                isFetched = true;
                clearInterval(interval);
                finalNumber = data.value;
                numberElement.innerText = String(finalNumber).padStart(6, '0');
            })
            .catch(err => {
                isFetched = true;
                clearInterval(interval);
                finalNumber = 100001;
                numberElement.innerText = "100001";
            });

        // ======= Canvas 畫卡片與下載 =======
        document.getElementById('confirm-download-btn').addEventListener('click', () => {
            const userNameInput = document.getElementById('user-name-input');
            const name = userNameInput.value.trim() || '神秘會員'; 
            const formattedNumber = String(finalNumber).padStart(6, '0');
            const canvas = document.getElementById('download-canvas');
            const ctx = canvas.getContext('2d');

            function drawTextAndSave() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillRect(0, 0, 600, 400);

                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(20, 20, 560, 360);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#000000'; 

                ctx.font = 'bold 32px "PML", "PMingLiU", "新細明體", serif';
                ctx.fillText('歡迎加入有線耳機復活俱樂部', 300, 100);

                ctx.beginPath();
                ctx.moveTo(120, 140);
                ctx.lineTo(480, 140);
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.font = 'bold 24px "PML", "PMingLiU", "新細明體", serif';
                ctx.fillText(`會員：${name}`, 300, 200);

                ctx.font = 'bold 24px "PML", "PMingLiU", "新細明體", serif';
                ctx.fillText(`編號：${formattedNumber}`, 300, 250);

                ctx.font = 'italic 22px "PML", "PMingLiU", "新細明體", serif';
                ctx.fillText('祝您有玫好的一天', 300, 320);

                nameModal.style.display = 'none';
                const imageParams = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.download = `wired-revival-card-${formattedNumber}.png`;
                downloadLink.href = imageParams;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            }

            const bgImg = new Image();
            bgImg.crossOrigin = "Anonymous"; 
            bgImg.src = '9.png';
            
            bgImg.onload = function() {
                ctx.drawImage(bgImg, 0, 0, 600, 400); 
                drawTextAndSave();
            };

            bgImg.onerror = function() {
                ctx.fillStyle = '#f3f4f6';
                ctx.fillRect(0, 0, 600, 400);
                drawTextAndSave();
            };
        });
    </script>
</body>
</html>

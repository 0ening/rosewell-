<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        body {
            font-family: "PML", 'PMingLiU', '新細明體', serif;
            background-image: url('r.jpg'); /* 沿用你好看的背景圖 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            -webkit-backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        .counter-box {
            position: relative;
            z-index: 2;
            background-color: #99ffcc; /* 沿用你最愛的薄荷綠 */
            border: 1px solid #55cc99;
            border-radius: 4px; /* 無名小站方塊感 */
            padding: 40px 30px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 80%;
        }
        h2 {
            font-size: 1.3rem;
            color: #000000;
            margin-bottom: 20px;
        }
        /* 復古計數器外框 */
        .number-area {
            display: inline-block;
            background: #000000; /* 經典黑底框 */
            border: 1px dashed #ffffff;
            padding: 12px 24px;
            margin: 10px 0;
            box-shadow: inset 0 0 10px rgba(204, 102, 255, 0.5);
        }
        /* 綠色電子跳動數字 */
        .custom-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ffcc; /* 薄荷綠電子字 */
            letter-spacing: 4px;
            font-family: monospace, serif; /* 讓數字等寬才像計數器 */
            text-shadow: 0px 0px 8px #00ffcc, 0px 0px 3px #ffffff;
        }
    </style>
</head>
<body>

    <div class="counter-box">
        <h2>🎧 有線耳機復活計畫 🎧</h2>
        <p style="color: #1e293b; margin-bottom: 10px;">恭喜你成為復活計畫的一員！</p>
        <p style="color: #1e293b; margin-bottom: 20px; font-size: 1.1rem;">您是第</p>
        
        <div class="number-area">
            <span id="member-id" class="custom-number">000000</span>
        </div>
        
        <p style="color: #1e293b; margin-top: 20px; font-size: 1.1rem;">位會員</p>
        <p style="color: #64748b; margin-top: 10px; font-size: 0.8rem;">★ 專屬計畫編號，請截圖保存 ★</p>
    </div>

    <script>
        const numberElement = document.getElementById('member-id');
        let finalNumber = 1; // 預設第一個人是 1
        const duration = 1500; // 動態滾動持續 1.5 秒
        let startTime = null;

        // 🌟 核心：向免費的 API 伺服器發送請求，每次有人打開網頁，該網址的數值就會自動 +1
        // 這裡使用你的專屬 namespace 來確保計數精準不與別人重疊
        fetch('https://api.countapi.xyz/hit/rosewell-earphone-project/visits')
            .then(res => res.json())
            .then(data => {
                // 成功拿到後台累加的真正數字（例如：1, 2, 3...）
                finalNumber = data.value;
            })
            .catch(err => {
                // 如果 API 偶爾斷線，就用本地隨機數保底，絕對不破圖
                finalNumber = Math.floor(Math.random() * 10) + 1;
            });

        // 數字像吃角子老虎機瘋狂閃爍跳動的特效
        function updateCounter(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsedTime = currentTime - startTime;
            
            if (elapsedTime < duration) {
                // 在 1.5 秒內，讓數字瘋狂隨機變動
                const randomDigits = Math.floor(Math.random() * 900000) + 100000;
                numberElement.innerText = randomDigits;
                
                requestAnimationFrame(updateCounter);
            } else {
                // 1.5 秒時間到，「咔」一聲停在真正的後台累加號碼，並補滿你要求的 6 位數（000001）
                numberElement.innerText = String(finalNumber).padStart(6, '0');
            }
        }

        // 開始執行滾動動畫
        requestAnimationFrame(updateCounter);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        body {
            font-family: "PML", 'PMingLiU', '新細明體', serif;
            background-image: url('r.jpg'); /* 沿用你好看的背景圖 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            -webkit-backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        .counter-box {
            position: relative;
            z-index: 2;
            background-color: #99ffcc; /* 沿用你最愛的薄荷綠 */
            border: 1px solid #55cc99;
            border-radius: 4px; /* 無名小站方塊感 */
            padding: 40px 30px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 80%;
        }
        h2 {
            font-size: 1.3rem;
            color: #000000;
            margin-bottom: 20px;
        }
        /* 號碼外框樣式 */
        .number-area {
            display: inline-block;
            background: #000000; /* 黑底框 */
            border: 1px dashed #ffffff;
            padding: 12px 24px;
            margin: 10px 0;
            box-shadow: inset 0 0 10px rgba(204, 102, 255, 0.5); /* 淡淡的內斂紫色光暈 🔮 */
        }
        /* 讓計數器數字圖片完美居中 */
        .counter-img {
            display: block;
            height: 32px; /* 控制數字圖片的大小 */
            image-rendering: pixelated; /* 讓數字保有復古的像素感 */
        }
    </style>
</head>
<body>

    <div class="counter-box">
        <h2>🎧 有線耳機復活計畫 🎧</h2>
        <p style="color: #1e293b; margin-bottom: 10px;">恭喜你成為復活計畫的一員！</p>
        <p style="color: #1e293b; margin-bottom: 20px; font-size: 1.1rem;">您是第</p>
        
        <div class="number-area">
            <img class="counter-img" src="https://moe-counter.glitch.me/get/@rosewell-earphone?theme=asoul" alt="Counter">
        </div>
        
        <p style="color: #1e293b; margin-top: 20px; font-size: 1.1rem;">位會員</p>
    </div>

</body>
</html>
</body>
</html

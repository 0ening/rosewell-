<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "PML", 'PMingLiU', '新細明體', serif;
            background-image: url('r.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            -webkit-backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        .top-nav {
            position: absolute; top: 20px; width: 100%; max-width: 800px; display: flex; padding: 0 20px; z-index: 10; font-weight: bold; font-size: 1.1rem;
        }
        .nav-links { background-color: #ccffcc; border: 1px solid #99ff99; padding: 6px 15px; display: flex; align-items: center; }
        .nav-links a { color: #0077ff; text-decoration: underline; margin-right: 15px; cursor: pointer; }
        .nav-links a:hover { color: #00bfff; }
        .counter-box {
            position: relative; z-index: 2; background-color: #99ffcc; border: 1px solid #55cc99; border-radius: 4px; padding: 40px 30px; text-align: center; box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15); max-width: 400px; width: 80%; margin-top: 50px;
        }
        h2 { font-size: 1.3rem; color: #000000; margin-bottom: 0px; margin-top: 0; font-weight: bold;}
        .number-area { display: inline-block; background: #000000; border: 1px dashed #ffffff; padding: 12px 24px; margin: 15px 0; box-shadow: inset 0 0 10px rgba(204, 102, 255, 0.5); }
        .custom-number { font-size: 2.5rem; font-weight: bold; color: #00ffcc; letter-spacing: 4px; font-family: monospace, serif; text-shadow: 0px 0px 8px #00ffcc, 0px 0px 3px #ffffff; }
        .rules-link { display: inline-block; margin-top: 15px; font-size: 0.9rem; color: #cc66ff; text-decoration: none; border-bottom: 1px dashed #cc66ff; transition: all 0.2s ease; font-weight: bold; background: transparent; border-top: none; border-left: none; border-right: none; cursor: pointer; padding: 2px 5px; }
        .rules-link:hover { color: #9900cc; border-bottom: 1px dashed #9900cc; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background-color: #ADFEDC; border: 2px solid #000000; box-shadow: 4px 4px 0px rgb(0, 204, 255); width: 85%; max-width: 350px; padding: 25px 20px; position: relative; text-align: left; }
        .close-btn { position: absolute; top: 6px; right: 6px; background: #ffcccc; border: 1px solid #000000; font-family: monospace, serif; font-size: 0.9rem; font-weight: bold; color: #000; cursor: pointer; padding: 2px 6px; }
        .rules-title { font-size: 1.05rem; font-weight: bold; color: #00BB00; margin-bottom: 15px; text-align: center; text-decoration: underline; }
        .rules-list { margin: 0; padding-left: 20px; color: #00BB00; font-size: 0.85rem; line-height: 1.6; font-weight: bold; }
        .name-input { width: 100%; padding: 10px; font-family: inherit; font-size: 1rem; border: 1px solid #000; margin-bottom: 20px; text-align: center; }
        .submit-btn { width: 100%; background: #00BB00; color: #fff; border: 1px solid #000; padding: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="nav-links">
            <a href="https://www.youtube.com/watch?v=ZhIsAZO5gl0">播放</a>
            <a href="#">暫停</a>
            <a href="#">取消</a>
            <a href="index.html">回到主頁</a>
        </div>
    </div>
    <div class="counter-box">
        <h2>✮ 有線耳機復活計畫 ♫</h2>
        <p style="color: #339966; margin-bottom: 0px;">恭喜你成為有線耳機復活計畫的一員！</p>
        <p style="color: #339966; margin-bottom: 0px;">♪ 好時光都該被寶貝因為有線~ ♪</p>
        <p style="color: #1e293b; margin-bottom: 5px; margin-top: 15px; font-size: 1.1rem; font-weight: bold;">您是第</p>
        <div class="number-area"><span id="member-id" class="custom-number">000000</span></div>
        <p style="color: #1e293b; margin-top: 5px; font-size: 1.1rem; font-weight: bold;">位加入的會員</p>
        <div style="margin-top: 10px;">
            <button id="download-trigger-btn" class="rules-link" style="margin-right: 15px;">下載</button>
            <a href="#" id="open-rules-btn" class="rules-link">✞ 查看會員規則 ✞</a>
        </div>
    </div>
    <div id="rules-modal" class="modal-overlay"><div class="modal-content"><button id="close-rules-btn" class="close-btn">X</button><div class="rules-title">★ 秘密會員規則 ★</div><ul class="rules-list"><li>1.需每天帶有線耳機出門。</li><li>2.擁有【有線耳機復活計畫】小卡。</li><li>3.尊重所有類型的音樂。</li><li>4.音樂沒有優劣之分。</li></ul></div></div>
    <div id="name-modal" class="modal-overlay"><div class="modal-content"><button id="close-name-btn" class="close-btn">X</button><div class="rules-title">★ 建立專屬會員卡 ★</div><input type="text" id="user-name-input" class="name-input" placeholder="Name" maxlength="10"><button id="confirm-download-btn" class="submit-btn">確定下載</button></div></div>
    <canvas id="download-canvas" width="600" height="400" style="display: none;"></canvas>

<script>
    // 1. 彈出視窗控制
    const rulesModal = document.getElementById('rules-modal');
    const nameModal = document.getElementById('name-modal');
    document.getElementById('open-rules-btn').onclick = (e) => { e.preventDefault(); rulesModal.style.display = 'flex'; };
    document.getElementById('close-rules-btn').onclick = () => rulesModal.style.display = 'none';
    document.getElementById('close-name-btn').onclick = () => nameModal.style.display = 'none';
    document.getElementById('download-trigger-btn').onclick = () => nameModal.style.display = 'flex';

    // 2. 獲取編號 (加上錯誤捕捉)
    const numberElement = document.getElementById('member-id');
    const gasUrl = 'https://script.google.com/macros/s/AKfycbytIyUt9P-5lejKe6KfYZxd2VezUG-Hy15wXGmooAQk78Rxw3erRx3HJu07LhawKektfA/exec';

    fetch(gasUrl)
        .then(res => res.json())
        .then(data => {
            // 如果 GAS 回傳的是 {value: 123} 結構
            const num = data.value || data; 
            numberElement.innerText = String(num).padStart(6, '0');
        })
        .catch(err => {
            console.error("無法抓取編號:", err);
            numberElement.innerText = "999999"; // 連線失敗顯示預設值
        });

    // 3. 修正下載邏輯 (強制載入圖片)
    document.getElementById('confirm-download-btn').addEventListener('click', () => {
        const name = document.getElementById('user-name-input').value.trim() || '隱形會員';
        const formattedNumber = numberElement.innerText;
        const canvas = document.getElementById('download-canvas');
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        
        bgImg.src = '9.png?' + new Date().getTime(); // 加上時間戳記，強制繞過瀏覽器快取
        bgImg.onload = function() {
            ctx.drawImage(bgImg, 0, 0, 600, 400);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#2F4F4F';
            ctx.font = 'bold 34px "PML", serif';
            ctx.fillText('有線耳機復活計畫', 300, 130);
            ctx.font = '26px "PML", serif';
            ctx.fillText(`會員：${name}`, 300, 210);
            ctx.font = 'bold 22px monospace';
            ctx.fillText(`ID: ${formattedNumber}`, 300, 270);
            
            const link = document.createElement('a');
            link.download = `member-${formattedNumber}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            nameModal.style.display = 'none';
        };
        bgImg.onerror = function() {
            alert("錯誤：找不到 9.png 圖片，請確認檔案是否在同資料夾！");
        };
    });
</script>
</body>
</html>

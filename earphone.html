<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            /* 蘋果與微軟雙管齊下的復古字體配方 */
            font-family: "PML", 'Songti TC', 'PMingLiU', '新細明體', 'Kaiti TC', serif;
            background-image: url('r.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            -webkit-backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        
        /* 🌟 頂部導覽列與淺螢光綠小方塊 */
        .top-nav {
            position: absolute;
            top: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-start;
            padding: 0 20px;
            z-index: 10;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .nav-links {
            background-color: #ccffcc; /* 淺螢光綠 */
            border: 1px solid #99ff99; /* 復古邊框 */
            padding: 6px 15px;
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: #0077ff; 
            text-decoration: underline;
            margin-right: 15px;
        }
        .nav-links a:last-child {
            margin-right: 0;
        }
        .nav-links a:hover {
            color: #00bfff;
        }
        
        /* 中間的主容器 */
        .counter-box {
            position: relative;
            z-index: 2;
            background-color: transparent; 
            padding: 35px 25px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center; 
            margin-top: 50px; 
        }
        
        /* 標題淺螢光綠小方塊 */
        h2 {
            font-size: 1.4rem;
            color: #000000;
            margin: 0; 
            line-height: 1.2;
            font-weight: bold;
            
            background-color: #ccffcc; 
            border: 1px solid #99ff99; 
            display: inline-block; 
            padding: 6px 15px;
            margin-bottom: 5px; 
            border-radius: 0; 
            text-shadow: none; 
        }
        
        .info-text {
            color: #000000; 
            font-size: 1.05rem; 
            font-weight: bold;
            
            background-color: #ccffcc;
            border: 1px solid #99ff99;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 0;
            margin: 5px 0;
            text-shadow: none; 
        }
        
        /* 🌟 復原：無名小站風的復古計數器方框 */
        .number-area {
            display: inline-block;
            background-color: #000000; /* 經典黑底 */
            border: 2px dashed #ccffcc; /* 搭配主題的淺螢光綠虛線框 */
            padding: 10px 25px;
            margin: 15px 0;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2); /* 復古像素感陰影 */
        }
        
        .custom-number {
            font-size: 2.6rem;
            font-weight: bold;
            color: #ccffcc; /* 淺螢光綠電子字體 */
            letter-spacing: 5px;
            font-family: 'Courier New', monospace, serif; /* 換成更有打字機/電子感的字體 */
            border-bottom: none; 
            padding: 0;
            text-shadow: 0px 0px 8px rgba(204, 255, 204, 0.6); /* 淡淡的電子螢光 */
        }

        /* 文字連結樣式共用 (規則與下載) */
        .text-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 1.05rem;
            color: #000000;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 1.5px solid #000000;
            background: transparent;
            border-top: none;
            border-left: none;
            border-right: none;
            cursor: pointer;
            font-family: inherit;
            padding: 2px 5px;
            transition: all 0.2s ease;
            text-shadow: 0px 0px 6px rgba(255, 255, 255, 0.9);
        }
        .text-link:hover:not(:disabled) {
            transform: scale(1.05);
            border-bottom: 1.5px dashed #000000;
            background: rgba(255, 255, 255, 0.3);
        }
        .text-link:active:not(:disabled) {
            transform: scale(0.98);
        }
        .text-link:disabled {
            color: #999999;
            border-bottom-color: #999999;
            cursor: not-allowed;
            text-shadow: none;
        }

        /* 彈出視窗樣式 (共用) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: transparent; 
            border: 2px solid #000000;
            width: 85%;
            max-width: 350px;
            padding: 30px 20px;
            position: relative;
            text-align: left;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
        }

        .close-btn {
            position: absolute;
            top: 6px; right: 6px;
            background: transparent;
            border: none;
            font-family: monospace, serif;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            padding: 2px 6px;
        }
        .close-btn:hover {
            color: #666;
        }

        .rules-title, .input-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #000000;
            margin-bottom: 20px;
            text-align: center;
        }
        .rules-list {
            margin: 0;
            padding-left: 20px;
            color: #000000;
            font-size: 0.95rem;
            line-height: 1.8;
            font-weight: bold;
        }
        .rules-list li { margin-bottom: 10px; }

        .name-input {
            width: 100%;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            border: 1px solid #000;
            border-bottom: 2px solid #000;
            background: transparent;
            margin-bottom: 20px;
            text-align: center;
        }
        .name-input:focus {
            outline: none;
            background: rgba(0,0,0,0.03);
        }
        
        .submit-btn {
            width: 100%;
            background: transparent;
            color: #000;
            border: 1.5px solid #000;
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .submit-btn:hover {
            background: #000;
            color: #fff;
        }

        #download-canvas {
            display: none;
        }
        
        .links-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-links">
            <a href="#">播放</a>
            <a href="#">暫停</a>
            <a href="#">取消</a>
            <a href="index.html">回到主頁</a>
        </div>
    </div>

    <div class="counter-box">
        <h2>歡迎加入</h2>
        <h2>有線耳機復活俱樂部</h2>
        
        <p class="info-text">您是第</p>
        
        <div class="number-area">
            <span id="member-id" class="custom-number">------</span>
        </div>
        
        <p class="info-text">位會員</p>
        
        <div class="links-container">
            <button id="download-trigger-btn" class="text-link" disabled>下載</button>
            <a href="#" id="open-rules-btn" class="text-link">會員規則</a>
        </div>
    </div>

    <div id="rules-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-rules-btn" class="close-btn">X</button>
            <div class="rules-title">會員規則</div>
            <ul class="rules-list">
                <li>需每天帶有線耳機出門。</li>
                <li>擁有【有線耳機復活計畫】小卡。</li>
                <li>尊重所有類型的音樂，遵守不批判、不比較、不評論。</li>
                <li>音樂沒有優劣之分，所有人都能擁有自己的信仰。</li>
            </ul>
        </div>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-name-btn" class="close-btn">X</button>
            <div class="input-title">建立會員卡</div>
            <p style="color: #000; font-size: 0.9rem; margin-bottom: 15px; text-align: center; font-weight: bold;">請輸入您的名字</p>
            <input type="text" id="user-name-input" class="name-input" placeholder="Name" maxlength="10">
            <button id="confirm-download-btn" class="submit-btn">確定產生</button>
        </div>
    </div>

    <canvas id="download-canvas" width="600" height="400"></canvas>

    <script>
        // ======= 彈出視窗控制 =======
        const rulesModal = document.getElementById('rules-modal');
        const openRulesBtn = document.getElementById('open-rules-btn');
        const closeRulesBtn = document.getElementById('close-rules-btn');

        const nameModal = document.getElementById('name-modal');
        const downloadTriggerBtn = document.getElementById('download-trigger-btn');
        const closeNameBtn = document.getElementById('close-name-btn');
        const userNameInput = document.getElementById('user-name-input');
        const confirmDownloadBtn = document.getElementById('confirm-download-btn');

        openRulesBtn.addEventListener('click', function(event) {
            event.preventDefault(); 
            rulesModal.style.display = 'flex';
        });
        closeRulesBtn.addEventListener('click', () => rulesModal.style.display = 'none');

        downloadTriggerBtn.addEventListener('click', function() {
            userNameInput.value = '';
            nameModal.style.display = 'flex';
            setTimeout(() => userNameInput.focus(), 100);
        });
        closeNameBtn.addEventListener('click', () => nameModal.style.display = 'none');

        window.addEventListener('click', function(event) {
            if (event.target === rulesModal) rulesModal.style.display = 'none';
            if (event.target === nameModal) nameModal.style.display = 'none';
        });

        // ======= 計數器與連線 =======
        const numberElement = document.getElementById('member-id');
        let finalNumber = 0; 
        let isLoaded = false;
        const duration = 1500; 
        let startTime = null;

        // 你的後台 GAS 網址 (沿用)
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzJDHInkQ5G1_rzHGT2dRBbuJSJyJ0l485zbrEpuwWq60PIU983J9CVrwA1qd4pCPpSGg/exec';

        if(gasUrl.indexOf('http') === 0) {
            fetch(gasUrl)
                .then(res => res.json())
                .then(data => {
                    finalNumber = data.value;
                    isLoaded = true;
                    downloadTriggerBtn.disabled = false;
                })
                .catch(err => {
                    finalNumber = 1;
                    isLoaded = true;
                    downloadTriggerBtn.disabled = false;
                });
        } else {
            isLoaded = true;
            downloadTriggerBtn.disabled = false;
        }

        function updateCounter(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsedTime = currentTime - startTime;
            
            if (elapsedTime < duration || !isLoaded) {
                const randomDigits = Math.floor(Math.random() * 900000) + 100000;
                numberElement.innerText = randomDigits;
                requestAnimationFrame(updateCounter);
            } else {
                numberElement.innerText = String(finalNumber).padStart(6, '0');
            }
        }
        requestAnimationFrame(updateCounter);

        // ======= Canvas 繪圖與下載 =======
        confirmDownloadBtn.addEventListener('click', generateAndDownloadCard);

        function generateAndDownloadCard() {
            const name = userNameInput.value.trim() || '神秘會員'; 
            const formattedNumber = String(finalNumber).padStart(6, '0');
            const canvas = document.getElementById('download-canvas');
            const ctx = canvas.getContext('2d');

            function drawTextAndSave() {
                // 鋪上一層半透明的白紗，讓後面的 r.jpg 若隱若現，但確保黑字能看清楚
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillRect(0, 0, 600, 400);

                // 畫一個簡單的黑色邊框
                ctx.strokeStyle = '#000000';

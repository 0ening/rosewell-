<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <div class="top-marquee">
        Rosewell☆Rosewell☆Rosewell☆Rosewell☆Rosewell☆Rosewell☆Rosewell☆Rosewell
    </div>
    
    <div class="top-nav">
        <div class="nav-links">
            <a href="#">播放</a>
            <a href="#">暫停</a>
            <a href="#">取消</a>
            <a href="#">回到過去</a>
        </div>
        <div class="welcome-text">
            🌀歡迎光臨秘密基地🌀
        </div>
    </div>

    <div class="main-columns">
        <div class="col left-col">
            <a href="#" class="retro-link blue-link">賣貨便</a>
            <a href="#" class="retro-link blue-link">原創插畫LINE貼圖</a>
            <a href="#" class="retro-link blue-link">恐怕泰龍LINE貼圖</a>
            <a href="#" class="retro-link blue-link">YouTube作品</a>
        </div>
        
        <div class="col right-col">
            <a href="earphone.html" class="retro-link purple-link">加入有線耳機復活計畫</a>
            <a href="#" class="retro-link purple-link">衣服型錄</a>
            <a href="#" class="retro-link purple-link">今天的一首歌：</a>
            <a href="#guestbook" class="retro-link purple-link">留言板</a>
        </div>
    </div>

    <div id="guestbook" class="guestbook-section">
        <div class="guestbook-title">✑ 秘密留言板</div>
        
        <div id="message-list" class="message-list">
            <div class="loading-msg">讀取最新留言中...</div>
        </div>

        <div class="guestbook-form">
            <input type="text" id="gb-name" placeholder="你的暱稱 (選填)" maxlength="10">
            <input type="text" id="gb-msg" placeholder="說點什麼吧..." maxlength="50">
            <button id="gb-submit">送出留言</button>
        </div>
    </div>

    <script>
        // 你的 Google Apps Script 網址 (請確認是你剛剛重新部署的那個)
        const gasUrl = https://script.google.com/macros/library/d/11xt61gI8rgBQsVvcamVNXQcX6kehxTJBDCvjLs5qDgqYlz9T1xtbAym_/3;
        
        const msgList = document.getElementById('message-list');
        const submitBtn = document.getElementById('gb-submit');
        const nameInput = document.getElementById('gb-name');
        const msgInput = document.getElementById('gb-msg');

        // 1. 網頁載入時，抓取最新留言
        function fetchMessages() {
            fetch(gasUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.messages && data.messages.length > 0) {
                        msgList.innerHTML = ''; // 清空載入中文字
                        data.messages.forEach(item => {
                            const msgDiv = document.createElement('div');
                            msgDiv.className = 'msg-item';
                            msgDiv.innerHTML = `<span class="msg-name">${item.name}：</span><span class="msg-content">${item.msg}</span>`;
                            msgList.appendChild(msgDiv);
                        });
                    } else {
                        msgList.innerHTML = '<div class="loading-msg">目前還沒有留言，搶頭香！</div>';
                    }
                })
                .catch(err => {
                    msgList.innerHTML = '<div class="loading-msg">讀取失敗，請重新整理。</div>';
                });
        }
        
        // 啟動抓取
        fetchMessages();

        // 2. 點擊送出留言
        submitBtn.addEventListener('click', () => {
            const name = nameInput.value.trim() || '神秘客';
            const msg = msgInput.value.trim();
            
            if (!msg) {
                alert('請輸入留言內容喔！');
                return;
            }

            submitBtn.innerText = '傳送中...';
            submitBtn.disabled = true;

            // 組合送出的網址
            const submitUrl = `${gasUrl}?action=add&name=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;

            fetch(submitUrl)
                .then(res => res.json())
                .then(data => {
                    // 送出成功，清空輸入框並重新抓取留言
                    msgInput.value = '';
                    submitBtn.innerText = '送出留言';
                    submitBtn.disabled = false;
                    msgList.innerHTML = '<div class="loading-msg">更新留言中...</div>';
                    fetchMessages(); // 重新整理列表
                })
                .catch(err => {
                    alert('傳送失敗，請稍後再試。');
                    submitBtn.innerText = '送出留言';
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
</body>

 <body>
    <div class="top-nav">

            🌀歡迎光臨秘密基地🌀

        <div style="display: flex; flex-direction: column;">
            <div class="nav-links">
                <a href="#" id="play-btn">播放</a>

                <a href="index.html">回到主頁</a>
            </div>
            
            <div id="inline-yt-player" style="display: none; margin-top: 10px; border: 2px solid #000; background: #ADFEDC; padding: 8px; box-shadow: 4px 4px 0px rgb(0, 204, 255); width: fit-content;">
                <div style="font-weight: bold; color: #00BB00; margin-bottom: 5px; text-align: center; font-size: 0.8rem;">♪ 播放中 ♪</div>
                <iframe id="yt-iframe" width="240" height="135" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="main-columns">
        <div class="col left-col">
            <a href="https://myship.7-11.com.tw/general/detail/GM2605239792358" target="_blank" class="retro-link blue-link">賣貨便</a>
            <a href="https://store.line.me/stickershop/product/33026754/zh-Hant" target="_blank" class="retro-link blue-link">𖠋 蛙持利斯LINE貼圖</a>
            <a href="https://store.line.me/stickershop/product/32046311/zh-Hant" target="_blank" class="retro-link blue-link">♞ 恐怕泰龍LINE貼圖</a>
            <a href="https://www.youtube.com/@0ening_2023" target="_blank" class="retro-link blue-link">YouTube作品</a>
        </div>
        
        <div class="col right-col">
            <a href="earphone.html" class="retro-link purple-link">加入有線耳機復活計畫</a>
            <a href="#" class="retro-link purple-link">衣服型錄</a>

            <a href="#guestbook" class="retro-link purple-link">留言板</a>
        </div>
    </div>

    <div id="guestbook" class="guestbook-section">
        <div class="guestbook-title">✑ 秘密留言板</div>
        
        <div id="message-list" class="message-list">
            <div class="loading-msg">讀取最新留言中...</div>
        </div>

        <div class="guestbook-form">
            <input type="text" id="gb-name" placeholder="你的暱稱 (選填)" maxlength="10">
            <input type="text" id="gb-msg" placeholder="說點什麼吧..." maxlength="50">
            <button id="gb-submit">送出留言</button>
        </div>
    </div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzJZ8IJGcObUCsw4shxqxdSjw2IJltQbWJQpf1LJq-jqAnlnO5yscF9ixz_JEKQwbGEaA/exec';
        
        const msgList = document.getElementById('message-list');
        const submitBtn = document.getElementById('gb-submit');
        const nameInput = document.getElementById('gb-name');
        const msgInput = document.getElementById('gb-msg');

        function fetchMessages() {
            fetch(gasUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.messages && data.messages.length > 0) {
                        msgList.innerHTML = ''; 
                        data.messages.forEach(item => {
                            const msgDiv = document.createElement('div');
                            msgDiv.className = 'msg-item';
                            msgDiv.innerHTML = `<span class="msg-name">${item.name}：</span><span class="msg-content">${item.msg}</span>`;
                            msgList.appendChild(msgDiv);
                        });
                    } else {
                        msgList.innerHTML = '<div class="loading-msg">目前還沒有留言，搶頭香！</div>';
                    }
                })
                .catch(err => {
                    msgList.innerHTML = '<div class="loading-msg">讀取失敗，請重新整理。</div>';
                });
        }
        
        fetchMessages();

        submitBtn.addEventListener('click', () => {
            const name = nameInput.value.trim() || '神秘客';
            const msg = msgInput.value.trim();
            
            if (!msg) {
                alert('請輸入留言內容喔！');
                return;
            }

            submitBtn.innerText = '傳送中...';
            submitBtn.disabled = true;

            const submitUrl = `${gasUrl}?action=add&name=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;

            fetch(submitUrl)
                .then(res => res.json())
                .then(data => {
                    msgInput.value = '';
                    submitBtn.innerText = '送出留言';
                    submitBtn.disabled = false;
                    msgList.innerHTML = '<div class="loading-msg">更新留言中...</div>';
                    fetchMessages(); 
                })
                .catch(err => {
                    alert('傳送失敗，請稍後再試。');
                    submitBtn.innerText = '送出留言';
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
